<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>மொழி மரபு - பப்சி சவால் | தொல்காப்பியம்</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 30%, #fde9cf, #f7cd92);
            font-family: 'Segoe UI', 'Poppins', 'Noto Sans Tamil', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* பப்சி வைப் கார்டு */
        .game-card {
            max-width: 600px;
            width: 100%;
            background: #fffaf2;
            border-radius: 70px 70px 60px 60px;
            box-shadow: 0 30px 35px rgba(0, 0, 0, 0.2), 0 0 0 10px #ffde59, 0 0 0 14px #e63946;
            overflow: hidden;
            transition: transform 0.15s ease;
        }

        .game-card:active {
            transform: scale(0.99);
        }

        .header {
            background: #e63946;
            padding: 22px 22px 18px 28px;
            color: white;
            text-shadow: 3px 3px 0 #a4252f;
            border-bottom: 5px solid #ffcd4a;
        }

        .header h1 {
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            font-weight: 800;
        }

        .badge {
            background: #ffde59;
            padding: 6px 20px;
            border-radius: 60px;
            color: #b12a1a;
            font-size: 1.2rem;
            box-shadow: inset 0 -2px 0 #c2a022;
        }

        .subhead {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-top: 8px;
            font-weight: 500;
            display: flex;
            gap: 20px;
        }

        .stats {
            background: #2c1a10;
            color: #ffefcf;
            display: flex;
            justify-content: space-between;
            padding: 12px 25px;
            font-weight: bold;
            font-size: 1.3rem;
            border-bottom: 2px solid #ffaa44;
        }

        .score, .streak {
            background: #00000055;
            padding: 5px 20px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
        }

        .streak {
            background: #f4a261;
            color: #2c1a10;
        }

        .game-area {
            padding: 28px 18px 20px;
        }

        .question-panel {
            background: #faeedb;
            border-radius: 65px;
            padding: 28px 12px;
            text-align: center;
            box-shadow: inset 0 1px 5px #ffe0aa, 0 15px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .tamil-letter {
            font-size: 4.8rem;
            font-weight: 800;
            font-family: 'Noto Sans Tamil', monospace;
            background: white;
            display: inline-block;
            padding: 12px 35px;
            border-radius: 100px;
            box-shadow: 0 9px 0 #bb8b5c;
            letter-spacing: 5px;
            color: #3a2412;
        }

        .question-hint {
            font-size: 1.1rem;
            margin-top: 18px;
            background: #ffeaaf;
            display: inline-block;
            padding: 6px 25px;
            border-radius: 40px;
            font-weight: bold;
            color: #b64926;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            margin: 20px 0 10px;
        }

        .opt-btn {
            background: #ffd966;
            border: none;
            font-size: 1.5rem;
            font-family: 'Noto Sans Tamil', monospace;
            font-weight: bold;
            padding: 10px 18px;
            min-width: 100px;
            border-radius: 60px;
            color: #3b2a1f;
            cursor: pointer;
            box-shadow: 0 6px 0 #b77b36;
            transition: 0.05s linear;
            text-align: center;
        }

        .opt-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #b77b36;
        }

        .feedback {
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 10px 0;
            padding: 12px;
            border-radius: 50px;
            background: #fff3e0;
        }

        .next-btn {
            background: #2e9c5e;
            color: white;
            border: none;
            width: 85%;
            padding: 14px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            margin: 10px auto 8px;
            display: block;
            cursor: pointer;
            box-shadow: 0 6px 0 #1a5a37;
            transition: 0.05s linear;
        }

        .next-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1a5a37;
        }

        .reset-btn {
            background: #f28444;
            box-shadow: 0 6px 0 #bd5727;
            margin-bottom: 20px;
            width: 65%;
        }

        .footer {
            background: #f2e0c0;
            text-align: center;
            padding: 12px;
            font-size: 0.7rem;
            color: #8b5a2b;
            border-top: 2px solid #ffd49f;
        }

        @keyframes bouncePop {
            0% { transform: scale(1);}
            70% { transform: scale(1.2); background: #f9c35c;}
            100% { transform: scale(1);}
        }
        .correct-bounce {
            animation: bouncePop 0.3s ease;
        }
        @media (max-width: 520px) {
            .tamil-letter { font-size: 3rem; padding: 8px 20px; }
            .opt-btn { font-size: 1.2rem; min-width: 75px; padding: 6px 12px; }
        }
    </style>
</head>
<body>
<div class="game-card">
    <div class="header">
        <h1>
            <span class="badge">🗣️ மொழி மரபு</span>
            <span>⚡ PEPSI கேம்</span>
        </h1>
        <div class="subhead">📖 தொல்காப்பியம் · எழுத்ததிகாரம் · மொழி மரபு · இன்றைய டிரெண்ட்</div>
    </div>
    <div class="stats">
        <div class="score">🏆 மதிப்பெண்: <span id="scoreValue">0</span></div>
        <div class="streak">🔥 தொடர்: <span id="streakValue">0</span></div>
    </div>
    <div class="game-area">
        <div class="question-panel">
            <div class="tamil-letter" id="questionLetter">கு</div>
            <div class="question-hint" id="questionHint">இது குற்றியலுகரமா?</div>
        </div>
        <div class="options" id="optionsContainer"></div>
        <div class="feedback" id="feedbackMsg">✨ பதிலைத் தேர்ந்தெடு! ✨</div>
        <button class="next-btn" id="nextBtn">➡ அடுத்த கட்டம்</button>
        <button class="next-btn reset-btn" id="resetBtn">🔄 புதுப்பு / மீள்தொடக்கம்</button>
    </div>
    <div class="footer">
        🧠 மொழி மரபு நூற்பாக்கள் (1-49) · குற்றியலிகரம், உகரம், ஆய்தம், ஒற்று விதிகள் & மெய் மயக்கம்
    </div>
</div>

<script>
    // ---------------------------------------------------------------
    // மொழி மரபு (தொல்காப்பியம் எழுத்ததிகாரம்) அடிப்படையில் 30+ கேள்விகள்
    // பப்சி ஸ்டைல்: வேகமான பதில், புள்ளிகள், தொடர் பலஸ்
    // விதிகள்: குற்றியலிகரம், குற்றியலுகரம், ஆய்தம், மெய் ஒற்று விதிகள்,
    // உயிர் முதல், ஈறு, யரழ முன் ஒற்று, நகர மகர ஒற்று, ஐ/ஔ புணர்ச்சி.
    // ---------------------------------------------------------------
    
    const questionSet = [
        // 1-2: குற்றியலிகரம் & உகரம் (நூற்பா 1-3)
        { display: "குற்றியலிகரம்", type: "எந்த எழுத்தின் இயல்பு?", correct: "இகரம் குறுகும்", options: ["இகரம் குறுகும்", "உகரம் நெடிக்கும்", "ஆய்தம் சேரும்", "மெய் இரட்டும்"], hint: "யா என் சினைமிசை உரையசைக் கிளவிக்கு ... மகரம் ஊர்ந்தே" },
        { display: "குற்றியலுகரம்", type: "இதன் முக்கிய இயல்பு?", correct: "வல் ஆறு ஊர்ந்து குறுகும்", options: ["வல் ஆறு ஊர்ந்து குறுகும்", "நெட்டெழுத்தாகும்", "எப்போதும் நீளும்", "ஆய்தமாக மாறும்"], hint: "நெட்டெழுத்து இம்பரும் தொடர்மொழி ஈற்றும் குற்றியலுகரம் வல் ஆறு ஊர்ந்தே (3)" },
        { display: "மகரம் + குற்றியலிகரம்", type: "குற்றியலிகரம் நிற்றல் வேண்டும்போது?", correct: "மகரம் ஊர்ந்து வரும்", options: ["மகரம் ஊர்ந்து வரும்", "யகரம் சேர்கும்", "உகரம் நீளும்", "புள்ளி குறையும்"], hint: "யா என் சினைமிசை... மகரம் ஊர்ந்தே (1)" },
        // ஆய்தம் (5-7)
        { display: "ஆய்தம்", type: "ஆய்தம் எப்போது தோன்றும்?", correct: "வல் ஆறன் மிசை உயிரொடு புணரும்", options: ["வல் ஆறன் மிசை உயிரொடு புணரும்", "மெய் முன் மட்டும்", "எல்லா இடத்தும்", "குற்றெழுத்து முன்"], hint: "குறியதன் முன்னர் ஆய்தப் புள்ளி / உயிரொடு புணர்ந்த வல் ஆறன் மிசைத்தே (5)" },
        { display: "ஆய்தம் அஃகாக் காலை", type: "எழுத்தின் இயல்பு?", correct: "உருவிலும் இசையிலும் அருகும்", options: ["உருவிலும் இசையிலும் அருகும்", "நெடில் ஆகும்", "மெய்யொடு சேரும்", "இசை நிற்கும்"], hint: "உருவினும் இசையினும் அருகித் தோன்றும்... ஆய்தம் அஃகாக் காலையான (7)" },
        // நெட்டெழுத்து & குற்றெழுத்து மொழிநிலை (8-12)
        { display: "ஐ", type: "ஐகாரத்தின் இசை நிறைவு எது?", correct: "இகரம்", options: ["இகரம்", "உகரம்", "அகரம்", "ஆய்தம்"], hint: "ஐ ஔ என்னும் ஆயீர் எழுத்திற்கு இகர உகரம் இசை நிறைவு ஆகும் (9)" },
        { display: "ஔ", type: "ஔகாரத்தின் இசை நிறைவு?", correct: "உகரம்", options: ["உகரம்", "இகரம்", "ஏகாரம்", "ஓகாரம்"], hint: "ஐ-இகரம், ஔ-உகரம் இசை நிறைவு" },
        { display: "ஓர் எழுத்து ஒருமொழி", type: "எத்தனை எழுத்துகள் ஒருமொழியாக வரும்?", correct: "உயிரெழுத்து மட்டும்", options: ["உயிரெழுத்து மட்டும்", "மெய் மட்டும்", "இரண்டும்", "எதுவும்"], hint: "நெட்டெழுத்து ஏழே ஓர் எழுத்து ஒருமொழி (10); குற்றெழுத்து ஐந்தும் மொழி நிறைபு இலவே" },
        // மெய் இயக்கம் & ஒற்று விதிகள் (13-17)
        { display: "ய்", type: "யகர முன் ஒற்றுமை விதி?", correct: "க ச த ப ங ஞ ந ம ஈர் ஒற்று", options: ["க ச த ப ங ஞ ந ம ஈர் ஒற்று", "வல்லெழுத்து மட்டும்", "இடையெழுத்து மட்டும்", "எந்த மெய்யும்"], hint: "ய ர ழ என்னும் மூன்றும் முன் ஒற்ற / க ச த ப ங ஞ ந ம ஈர் ஒற்று ஆகும் (15)" },
        { display: "ரகாரம்", type: "ரகாரம் முன் ஒற்று ஆகுமா?", correct: "குற்றொற்று ஆகாது", options: ["குற்றொற்று ஆகாது", "ஈரொற்று ஆகும்", "எப்போதும் ஒற்று", "வல்லினமாகும்"], hint: "ரகார ழகாரம் குற்றொற்று ஆகா (16)" },
        { display: "னகர மகாரம்", type: "செய்யுள் இறுதியில்?", correct: "ஈர் ஒற்று ஆகும்", options: ["ஈர் ஒற்று ஆகும்", "குறுகும்", "நெடிலாகும்", "ஆய்தமாகும்"], hint: "செய்யுள் இறுதிப் போலும் மொழிவயின் / னகார மகாரம் ஈர் ஒற்று ஆகும் (18)" },
        { display: "னகரை முன்னர் மகாரம்", type: "மகாரம் எவ்வாறு நிகழும்?", correct: "குறுகும்", options: ["குறுகும்", "நெடுகும்", "இரட்டும்", "மாறாது"], hint: "னகாரை முன்னர் மகாரம் குறுகும் (19)" },
        // புணர்ச்சி: அகர+இகர=ஐ, அகர+உகர=ஔ (21,22)
        { display: "அ + இ", type: "இணைந்து வரும் எழுத்து?", correct: "ஐ", options: ["ஐ", "ஔ", "ஏ", "ஒ"], hint: "அகர இகரம் ஐகாரம் ஆகும் (21)" },
        { display: "அ + உ", type: "இணைந்து உருவாவது?", correct: "ஔ", options: ["ஔ", "ஐ", "ஓ", "ஆ"], hint: "அகர உகரம் ஔகாரம் ஆகும் (22)" },
        // மொழி முதல் விதிகள் (26-33)
        { display: "மொழி முதல் ஆகக் கூடியவை", type: "எந்த எழுத்துகள்?", correct: "பன்னீர் உயிரும்", options: ["பன்னீர் உயிரும்", "மெய் மட்டும்", "உயிர்மெய் மட்டும்", "ஆய்தம் மட்டும்"], hint: "பன்னீர் உயிரும் மொழி முதல் ஆகும் (26)" },
        { display: "மொழி முதல் ஆகா எழுத்து", type: "எது முதலாகாது?", correct: "உயிர்மெய் அல்லன", options: ["உயிர்மெய் அல்லன", "உயிர்", "நெடில்", "குறில்"], hint: "உயிர் மெய் அல்லன மொழி முதல் ஆகா (27)" },
        { display: "க த ந ப ம", type: "இவற்றின் இயல்பு?", correct: "எல்லா உயிரொடும் முதலாகும்", options: ["எல்லா உயிரொடும் முதலாகும்", "சில உயிரொடும் மட்டும்", "உயிருடன் சேரா", "இறுதியில் மட்டும்"], hint: "க த ந ப ம எனும் ஆவைந்து எழுத்தும் எல்லா உயிரொடும் செல்லுமார் முதலே (28)" },
        // ஞகார உரிய உயிர்கள் (31)
        { display: "ஞ் + ?", type: "ஞகாரத்திற்கு முதல் உயிர் எது உரியது?", correct: "ஆ எ ஒ", options: ["ஆ எ ஒ", "அ இ உ", "ஈ ஊ", "ஏ ஐ"], hint: "ஆ எ ஒ எனும் மூ உயிர் ஞகாரத்து உரிய (31)" },
        // யகரம் முதலாதல் (32)
        { display: "யகரம் முதலாக வர", type: "எந்த உயிருடன் வரும்?", correct: "ஆவொடு", options: ["ஆவொடு", "ஈயொடு", "ஓவொடு", "எல்லாம்"], hint: "ஆவொடு அல்லது யகரம் முதலாது (32)" },
        // குற்றியலுகர முறைப்பெயர் (34-35)
        { display: "குற்றியலுகரம் முறைப்பெயர்", type: "எந்த எழுத்துடன் சேரும்?", correct: "நகரமொடு முதலும்", options: ["நகரமொடு முதலும்", "மகரத்துடன்", "யகரத்துடன்", "தனித்து"], hint: "குற்றியலுகரம் முறைப்பெயர் மருங்கின் ஒற்றிய நகரமிசை நகரமொடு முதலும் (34)" },
        // உயிர் ஔ இறுதி & க வவொடு இயையின் (36-37)
        { display: "உயிர் ஔ", type: "எந்த இடத்தில் வரும்?", correct: "இறுதி ஆகும்", options: ["இறுதி ஆகும்", "முதல் ஆகும்", "இடையில் மட்டும்", "ஒருபோதும் வராது"], hint: "உயிர் ஔ எஞ்சிய இறுதி ஆகும் (36)" },
        { display: "க வவொடு இயையின்", type: "ஔகாரம் எவ்வாறு?", correct: "ஔவும் ஆகும்", options: ["ஔவும் ஆகும்", "ஓ ஆகும்", "உ ஆகும்", "அ ஆகும்"], hint: "க வவொடு இயையின் ஔவும் ஆகும் (37)" },
        // புள்ளி இறுதி (45)
        { display: "புள்ளி இறுதியாக வரும் எழுத்துகள்", type: "எத்தனை?", correct: "பதினொன்று", options: ["பதினொன்று", "பன்னிரண்டு", "எட்டு", "பத்து"], hint: "ஞ ண ந ம ன ய ர ல வ ழ ள என்னும் அப் பதினொன்றே புள்ளி இறுதி (45)" },
        // உச் சகாரம் & உப் பகாரம் (46-47)
        { display: "உச் சகாரமொடு", type: "எது சிவணும்?", correct: "நகாரம்", options: ["நகாரம்", "மகாரம்", "யகாரம்", "ணகாரம்"], hint: "உச் சகாரமொடு நகாரம் சிவணும் (46)" },
        { display: "உப் பகாரமொடு", type: "சேரும் எழுத்து?", correct: "ஞகாரம்", options: ["ஞகாரம்", "னகாரம்", "ணகாரம்", "மகாரம்"], hint: "உப் பகாரமொடு ஞகாரையும் அற்றே (47)" },
        // வகர ஈறு & மகர,னகரத் தொடர்மொழி (48-49)
        { display: "வகரக் கிளவி", type: "எத்தனை மொழி ஈற்றது?", correct: "நான் மொழி", options: ["நான் மொழி", "ஐந்து மொழி", "மூன்று மொழி", "எட்டு மொழி"], hint: "வகரக் கிளவி நான் மொழி ஈற்றது (48)" },
        { display: "னகரத் தொடர்மொழி", type: "எத்தனை என்ப?", correct: "ஒன்பது", options: ["ஒன்பது", "ஏழு", "பத்து", "ஆறு"], hint: "னகரத் தொடர்மொழி ஒன்பஃது என்ப (49)" },
        // மெய் இயக்கம் அகரமொடு (13)
        { display: "மெய்யின் இயக்கம்", type: "எதனோடு சிவணும்?", correct: "அகரமொடு", options: ["அகரமொடு", "இகரமொடு", "உகரமொடு", "ஆய்தத்துடன்"], hint: "மெய்யின் இயக்கம் அகரமொடு சிவணும் (13)" }
    ];

    // helper shuffle
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    let activeQuestions = [];
    let currentIdx = 0;
    let totalScore = 0;
    let currentStreak = 0;
    let answerLock = false;
    let currentQ = null;

    // DOM elements
    const letterSpan = document.getElementById("questionLetter");
    const hintSpan = document.getElementById("questionHint");
    const optionsDiv = document.getElementById("optionsContainer");
    const feedbackSpan = document.getElementById("feedbackMsg");
    const scoreSpan = document.getElementById("scoreValue");
    const streakSpan = document.getElementById("streakValue");
    const nextButton = document.getElementById("nextBtn");
    const resetButton = document.getElementById("resetBtn");

    function updateUIStats() {
        scoreSpan.innerText = totalScore;
        streakSpan.innerText = currentStreak;
    }

    function loadQuestion() {
        if (currentIdx >= activeQuestions.length) {
            // game finished, win state
            letterSpan.innerText = "🏁🏆";
            hintSpan.innerText = "மொழி மரபு மாஸ்டர்! மீண்டும் தொடங்கு!";
            optionsDiv.innerHTML = '<button class="opt-btn" disabled>✨ வெற்றி ✨</button>';
            feedbackSpan.innerHTML = "🎉 நீங்கள் தொல்காப்பிய வெற்றியாளர்! 🎉";
            nextButton.disabled = true;
            nextButton.style.opacity = "0.6";
            return;
        }
        nextButton.disabled = false;
        nextButton.style.opacity = "1";
        answerLock = false;
        currentQ = activeQuestions[currentIdx];
        letterSpan.innerText = currentQ.display;
        hintSpan.innerText = currentQ.hint || "விடையை தேர்ந்தெடு!";
        // shuffle options for excitement
        let opts = [...currentQ.options];
        if (!opts.includes(currentQ.correct)) opts.push(currentQ.correct);
        const shuffledOptions = shuffleArray([...new Set(opts)]);
        optionsDiv.innerHTML = "";
        shuffledOptions.forEach(opt => {
            const btn = document.createElement("button");
            btn.innerText = opt;
            btn.classList.add("opt-btn");
            btn.addEventListener("click", (e) => handleAnswer(opt, btn));
            optionsDiv.appendChild(btn);
        });
        feedbackSpan.innerHTML = "⚡ பதில் சொல்லி புள்ளி வாங்கு! ⚡";
        feedbackSpan.style.background = "#fff3e0";
        feedbackSpan.style.color = "#b85c1a";
    }

    function handleAnswer(selected, btnElement) {
        if (answerLock) {
            feedbackSpan.innerHTML = "⏳ ஏற்கனவே விடை அளித்துவிட்டீர்கள்! அடுத்த கேள்விக்கு செல்லுங்கள்.";
            return;
        }
        const isCorrect = (selected === currentQ.correct);
        answerLock = true;
        if (isCorrect) {
            let pointGain = 10;
            if (currentStreak >= 4) pointGain = 18;
            else if (currentStreak >= 2) pointGain = 14;
            totalScore += pointGain;
            currentStreak += 1;
            feedbackSpan.innerHTML = `✅ சரி! +${pointGain} புள்ளிகள்! 🔥 தொடர் ${currentStreak}`;
            feedbackSpan.style.background = "#cfe9d8";
            feedbackSpan.style.color = "#166534";
            letterSpan.classList.add("correct-bounce");
            setTimeout(() => letterSpan.classList.remove("correct-bounce"), 300);
        } else {
            currentStreak = 0;
            feedbackSpan.innerHTML = `❌ தவறு! சரியான விடை: "${currentQ.correct}". முயற்சி தொடர்க!`;
            feedbackSpan.style.background = "#ffded5";
            feedbackSpan.style.color = "#b33a1c";
        }
        updateUIStats();
        // disable all buttons and mark correct option
        const allBtns = document.querySelectorAll(".opt-btn");
        allBtns.forEach(btn => {
            btn.disabled = true;
            if (btn.innerText === currentQ.correct) {
                btn.style.background = "#5fa04f";
                btn.style.boxShadow = "0 4px 0 #2b6e2b";
                btn.style.color = "white";
            } else if (btn === btnElement && !isCorrect) {
                btn.style.background = "#d9534f";
                btn.style.boxShadow = "0 4px 0 #9b2e2a";
            }
        });
    }

    function nextQuestion() {
        if (!answerLock && currentIdx < activeQuestions.length) {
            feedbackSpan.innerHTML = "⚠️ முதலில் ஒரு விடையைத் தேர்ந்தெடுக்கவும்!";
            feedbackSpan.style.background = "#ffefb9";
            return;
        }
        if (currentIdx >= activeQuestions.length) {
            resetGame();
            return;
        }
        currentIdx++;
        loadQuestion();
    }

    function resetGame() {
        // reshuffle questions from master set
        activeQuestions = shuffleArray([...questionSet]);
        currentIdx = 0;
        totalScore = 0;
        currentStreak = 0;
        answerLock = false;
        updateUIStats();
        loadQuestion();
        feedbackSpan.innerHTML = "🔄 புதிய ஆட்டம்! மொழி மரபில் மூழ்குங்கள்!";
        feedbackSpan.style.background = "#fff3e0";
        nextButton.disabled = false;
    }

    // initial setup
    activeQuestions = shuffleArray([...questionSet]);
    currentIdx = 0;
    totalScore = 0;
    currentStreak = 0;
    answerLock = false;
    updateUIStats();
    loadQuestion();

    nextButton.addEventListener("click", nextQuestion);
    resetButton.addEventListener("click", resetGame);
</script>
</body>
</html>
